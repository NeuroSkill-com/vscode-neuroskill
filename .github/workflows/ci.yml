name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Type-check + compile
        run: npm run build

      - name: Package (.vsix)
        run: npm run package

      - name: Upload .vsix as artifact
        uses: actions/upload-artifact@v4
        with:
          name: neuroskill-vsix
          path: neuroskill-*.vsix
          retention-days: 14
          if-no-files-found: error
