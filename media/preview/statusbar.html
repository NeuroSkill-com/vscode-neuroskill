<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>NeuroSkill — Status bar</title>
<link rel="stylesheet" href="_styles.css" />
<style>
  body { padding: 0; width: 1100px; background: transparent; }
  .stack { display: flex; flex-direction: column; gap: 8px; padding: 8px; background: #1e1e1e; }
  .label { font-size: 11px; color: var(--vscode-descriptionForeground); padding: 0 2px; }
</style>
</head>
<body>
<div class="stack">
  <span class="label">In flow — connected</span>
  <div class="statusbar">
    <div class="left">
      <span class="item"><span class="icon">⌨</span> coding</span>
      <span class="item"><span class="icon">🔥</span> flow 47m</span>
      <span class="item"><span class="icon">⚡</span> 7d</span>
      <span class="item spacer"></span>
    </div>
    <div class="right">
      <span class="item"><span class="icon">🔌</span> NeuroSkill</span>
    </div>
  </div>

  <span class="label">Debugging while struggling — connected</span>
  <div class="statusbar">
    <div class="left">
      <span class="item"><span class="icon">🐞</span> debugging</span>
      <span class="item warning"><span class="icon">⚠</span> stuck:72</span>
      <span class="item spacer"></span>
    </div>
    <div class="right">
      <span class="item"><span class="icon">🔌</span> NeuroSkill</span>
    </div>
  </div>

  <span class="label">Idle — daemon not running</span>
  <div class="statusbar">
    <div class="left">
      <span class="item"><span class="icon">🧠</span> idle</span>
      <span class="item spacer"></span>
    </div>
    <div class="right">
      <span class="item warning"><span class="icon">⚠</span> NeuroSkill</span>
    </div>
  </div>
</div>
</body>
</html>
